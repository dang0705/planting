name: PR Check

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    name: Code and mini program build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VITE_APP_ENV: development
      VITE_CLOUDBASE_ENV_ID: cloud1-2grufevs395a9d5e

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check tracked secrets
        run: npm run check:secrets

      - name: Lint
        run: npm run lint

      - name: Test tracked CI suite
        run: npm run test:ci

      - name: Build Weixin mini program
        run: npm run build:mp-weixin:ci
