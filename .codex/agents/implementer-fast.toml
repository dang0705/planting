- ...

## 未改动内容
- 明确未改哪些相关内容，避免误解为已覆盖。

## 模块化影响
- 是否影响模块边界：否 / 是
- 是否引入新依赖：否 / 是
- 是否扩大任务范围：否 / 是

## 文档同步建议
- 是否需要文档同步：否 / 是
- 涉及文档：README / docs/ai-rules / docs/code-logics / docs/new-rules / 避坑索引 / 其他
- 是否建议派发 `docs_keeper`：否 / 是，原因：

## 验证结果
- 已运行命令：
- 结果：通过 / 失败 / 未运行
- 未运行原因：

## 风险
- ...

## 是否需要升级给 implementer_deep
- 否 / 是
- 原因：

## 给 architect_reviewer 的实现后代码 review 重点
- 是否需要：是 / 否
- 重点：

## 是否需要 qa_reviewer
- 否 / 是
- 建议检查重点：

## Handoff
- docs/ai-runs handoff 路径：
- 是否已创建或更新 handoff：是 / 否
- 未创建原因：
- 当前状态：
- 后续建议：
"""
